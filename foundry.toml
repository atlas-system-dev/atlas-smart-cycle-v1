# Build:  forge build
# Dependencies: OpenZeppelin v4.9.6 (git submodule — see .gitmodules / remappings.txt)

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# --- RPC endpoints (override with env: export BSC_RPC_URL=...) ---
[rpc_endpoints]
bsc = "${BSC_RPC_URL}"

[etherscan]
bsc = { key = "${BSCSCAN_API_KEY}", chain = 56 }
